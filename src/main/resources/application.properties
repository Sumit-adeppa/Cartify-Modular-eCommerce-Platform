spring.application.name=Cartify-Modular-eCommerce-Platform

server.port=9090
spring.datasource.url=jdbc:mysql://localhost:3306/cartify
spring.datasource.username=DB_UserName
spring.datasource.password=DB_Password
#spring.jpa.hibernate.ddl-auto=update
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
jwt.secret=your-very-long-secure-secret-key-for-production-12345678901234567890
jwt.expiration=3600000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable CORS for specific endpoints
spring.web.cors.allowed-origin-patterns=http://localhost:5173/
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=36000
spring.web.cors.allowed-origins=http://localhost:5173/
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO

razorpay.key_id= razorpay.key_id
razorpay.key_secret= razorpay.key_secret


# Swagger/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.packages-to-scan=com.example.demo.controller,com.example.demo.admincontrollers
springdoc.paths-to-match=/**
